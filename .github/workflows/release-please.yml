name: release-please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  # Everything that runs third-party code lives here, in a job with no publish
  # identity. A release created by GITHUB_TOKEN starts no new workflow runs, so
  # publishing has to happen in this workflow rather than on a release trigger.
  verify:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      # publish runs with --ignore-scripts, so prepublishOnly never fires there;
      # its packaging gates run here instead.
      - run: bunx publint
      - run: bunx attw --pack . --profile esm-only
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC provenance)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      # Publishing shells to npm rather than bun because OIDC trusted publishing
      # needs npm >= 11.5.1.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      # This job installs nothing, so no dependency lifecycle script can run
      # under the publish identity. --ignore-scripts keeps it that way.
      - run: npm publish --ignore-scripts
