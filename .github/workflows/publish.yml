name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Bun runs install, tests, and the build; publishing itself stays on npm
      # because OIDC trusted publishing needs npm >= 11.5.1.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun test
      # prepublishOnly runs build + publint + attw; publish carries OIDC provenance
      - run: npm publish
