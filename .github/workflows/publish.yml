name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      # prepublishOnly runs build + publint + attw
      - run: npm publish
