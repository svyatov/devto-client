version: 2
updates:
  # The toolchain is Bun, but bun.lock sits alongside a standard package.json,
  # so the npm ecosystem is the right declaration. Everything here is a
  # devDependency; the published package has no runtime dependencies.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-minor-and-patch:
        update-types: [minor, patch]
  # Deliberately ungrouped, unlike npm above: the release-please workflow holds
  # the publish identity, so each action bump arrives as its own reviewable PR
  # rather than batched into one diff line.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
